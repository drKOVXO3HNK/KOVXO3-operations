<!doctype html><html><head><meta charset='utf-8'><title>Login</title>
<style>
:root{--bg:#0b1118;--panel:#121c28;--border:#284056;--text:#e6eef7;--accent:#61b8ff}
*{box-sizing:border-box}body{font-family:Inter,Segoe UI,Arial;background:radial-gradient(circle at 50% -20%, #203249, var(--bg));color:var(--text);margin:0;min-height:100vh;display:grid;place-items:center}
.card{width:360px;background:linear-gradient(180deg,#152233,#101923);border:1px solid var(--border);border-radius:14px;padding:18px;box-shadow:0 10px 30px #00000066}
input,button{width:100%;margin:7px 0;padding:10px;border-radius:10px;border:1px solid #35506e;background:#0f1a26;color:var(--text)}
input:focus{border-color:var(--accent);box-shadow:0 0 0 3px #61b8ff22;outline:none}button{cursor:pointer;background:#1f3950;font-weight:700}button:hover{background:#295071}
.err{color:#ff9f9f;font-size:13px}
</style>
</head><body><div class='card'><h3>Вход в KOVXO3 Operations</h3>{% if error %}<div class='err'>{{error}}</div>{% endif %}<form method='post' action='/login'><input name='username' placeholder='username' required><input name='password' placeholder='password' type='password' required><button>Войти</button></form></div></body></html>
